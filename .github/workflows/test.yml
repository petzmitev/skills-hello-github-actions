name: Test My CLI Setup

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install My CLI
        uses: ./.github/actions/my-cli-action
        with:
          version: "1.2.3"

      - name: Verify CLI
        run: |
          echo "CLI installed"
          mycli --version
